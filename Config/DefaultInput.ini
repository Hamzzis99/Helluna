; ============================================================================
; [Phase 22] ASpectatorPawn 자유비행용 legacy Axis Mappings
;   ASpectatorPawn::SetupPlayerInputComponent 가 BindAxis 로 잡는 axis 들.
;   Enhanced Input 과 공존(EnhancedPlayerInput 이 legacy 매핑 역호환).
